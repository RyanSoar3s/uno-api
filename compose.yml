services:
  uno_db:
    image: postgres:18
    restart: always
    environment:
      - POSTGRES_USER=$POSTGRES_USER
      - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
      - POSTGRES_DB=$POSTGRES_DB
    ports:
      - "51214:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
